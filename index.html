<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de moedas</title>
    <link rel="stylesheet" href="styles/index.css">

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <img src="assets/logo.svg" alt="logo">
    <main>
        <form action="#">
            
            <label>
                VALOR
                <input type="text" name="valor" id="value" value="100.00" class="input">
            </label>
            
            <label>
                MOEDA
                <select name="moeda" id="coin" class="input">
                    <option value="" disabled selected>Selecione a moeda</option>
                    <option value="dollar">Dólar americano</option>
                    <option value="euro">Euro</option>
                    <option value="yen">Iene japonês</option>
                    <option value="peso">Peso argentino</option>
                    <option value="yuan">Yuan chinês</option>
                </select>
            </label>

            <input type="submit" value="Converte em reais" class="btn">
        </form>
        <div class="result-container">
            <p class="result-quote">
                US$ 1 = R$ 4,86
            </p>
            <p class="result-value">
                486,00 Reais
            </p>
        </div>
    </main>
</body>
</html>
