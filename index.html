<!DOCTYPE html>
<html lang="pt-br">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de moedas</title>
    <link rel="stylesheet" href="styles/index.css">

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Inter:opsz,wght@14..32,100..900&family=Monomaniac+One&display=swap" rel="stylesheet">

</head>
<body>

    <header class="logo-container">
        <img src="assets/logo.svg" alt="Convert (logo)">
        <h1>CONVERT</h1>
    </header>

    <main>
        <form action="#" class="border-form">
            
            <label>
                <span>VALOR</span>
                <input type="text" name="amount" id="amount" value="0,00" required>
            </label>
            
            <label>
                <span>MOEDA</span>
                <select name="currency" id="currency">
                    <option value="" disabled selected>Selecione a moeda</option>
                    <option value="USD">Dólar (USD)</option>
                    <option value="EUR">Euro (EUR)</option>
                    <option value="JPY">Iene (JPY)</option>
                    <option value="ARS">Peso (ARS)</option>
                    <option value="CNY">Yuan (CNY)</option>
                </select>
            </label>

            <button type="submit">Converter em reais</button>

        </form>

        <div class="result-container">

            <p class="result-quote">US$ 1 = R$ 4,86</p>
            <h2 class="result-value">486,00 Reais</h2>

        </div>

    </main>

</body>
</html>
